name: Web CI

# CI for the Next.js frontend (web/).
# Installs deps, lints, and builds on every push/PR.
# The build uses the public testnet defaults baked into web/lib/config.ts, so no
# secrets are required for CI to pass.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  lint-build:
    name: install · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
